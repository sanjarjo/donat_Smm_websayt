<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Paneli | smpin.uz</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-header {
      background: var(--surface2);
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .tabs-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);
    }
    .tabs-nav button {
      padding: 12px 20px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    .tabs-nav button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .orders-table th {
      background: var(--surface2);
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      color: var(--accent);
    }
    .orders-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      display: inline-block;
    }
    .status-pending {
      background: rgba(255, 179, 0, 0.2);
      color: var(--accent2);
    }
    .status-approved {
      background: rgba(0, 229, 160, 0.2);
      color: var(--accent3);
    }
    .status-rejected {
      background: rgba(255, 100, 100, 0.2);
      color: #ff6464;
    }
    .status-processing {
      background: rgba(56, 193, 255, 0.2);
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="admin-header">
    <div class="admin-container" style="display: flex; justify-content: space-between; align-items: center;">
      <h1 style="margin: 0;">Admin Paneli</h1>
      <button class="btn-outline" id="logoutBtn" style="padding: 10px 20px;">Chiqish</button>
    </div>
  </div>

  <div class="admin-container">
    <div class="tabs-nav">
      <button class="tab-btn active" data-tab="replenishment">Balans Talab</button>
      <button class="tab-btn" data-tab="orders">Buyurtmalar</button>
      <button class="tab-btn" data-tab="users">Foydalanuvchilar</button>
    </div>

    <!-- Replenishment Tab -->
    <div id="replenishment" class="tab-content active">
      <h2>Balans Qo'shish So'rovlari</h2>
      <table class="orders-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Foydalanuvchi</th>
            <th>Miqdor</th>
            <th>Turi</th>
            <th>Status</th>
            <th>Vaqti</th>
          </tr>
        </thead>
        <tbody id="replenishmentList">
          <tr><td colspan="6" style="text-align: center; color: var(--muted);">Yuklanmoqda...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Orders Tab -->
    <div id="orders" class="tab-content">
      <h2>Barcha Buyurtmalar</h2>
      <table class="orders-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Foydalanuvchi</th>
            <th>Turi</th>
            <th>Platforma</th>
            <th>Narx</th>
            <th>Status</th>
            <th>Vaqti</th>
          </tr>
        </thead>
        <tbody id="ordersList">
          <tr><td colspan="7" style="text-align: center; color: var(--muted);">Yuklanmoqda...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Users Tab -->
    <div id="users" class="tab-content">
      <h2>Foydalanuvchilar</h2>
      <table class="orders-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Ism</th>
            <th>Email</th>
            <th>Telegram</th>
            <th>Balans</th>
            <th>Ro'yxat</th>
          </tr>
        </thead>
        <tbody id="usersList">
          <tr><td colspan="6" style="text-align: center; color: var(--muted);">Yuklanmoqda...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="notifications.js"></script>
  <script>
    // Simple admin check - replace with proper JWT/session auth
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if not logged in (this is basic - should use proper auth)
      const logoutBtn = document.getElementById('logoutBtn');
      logoutBtn.addEventListener('click', async () => {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/';
      });

      // Load data on tab switch
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
          const tab = btn.dataset.tab;
          document.getElementById(tab).classList.add('active');
        });
      });
    });
  </script>
</body>
</html>

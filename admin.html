<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Paneli | smpin.uz</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-header {
      background: var(--surface2);
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .tabs-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);
    }
    .tabs-nav button {
      padding: 12px 20px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    .tabs-nav button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .orders-table th {
      background: var(--surface2);
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      color: var(--accent);
    }
    .orders-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      display: inline-block;
    }
    .status-pending {
      background: rgba(255, 179, 0, 0.2);
      color: var(--accent2);
    }
    .status-approved {
      background: rgba(0, 229, 160, 0.2);
      color: var(--accent3);
    }
    .status-rejected {
      background: rgba(255, 100, 100, 0.2);
      color: #ff6464;
    }
    .status-processing {
      background: rgba(56, 193, 255, 0.2);
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="admin-header">
    <div class="admin-container" style="display: flex; justify-content: space-between; align-items: center;">
      <h1 style="margin: 0;">Admin Paneli</h1>
      <button class="btn-outline" id="logoutBtn" style="padding: 10px 20px;">Chiqish</button>
    </div>
  </div>

  <div class="admin-container">
    <div class="tabs-nav">
      <button class="tab-btn active" data-tab="replenishment">Balans Talab</button>
      <button class="tab-btn" data-tab="orders">Buyurtmalar</button>
      <button class="tab-btn" data-tab="users">Foydalanuvchilar</button>
    </div>

    <!-- Replenishment Tab -->
    <div id="replenishment" class="tab-content active">
      <h2>Balans Qo'shish So'rovlari</h2>
      <table class="orders-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Foydalanuvchi</th>
            <th>Miqdor</th>
            <th>Turi</th>
            <th>Status</th>
            <th>Vaqti</th>
          </tr>
        </thead>
        <tbody id="replenishmentList">
          <tr><td colspan="6" style="text-align: center; color: var(--muted);">Yuklanmoqda...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Orders Tab -->
    <div id="orders" class="tab-content">
      <h2>Barcha Buyurtmalar</h2>
      <table class="orders-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Foydalanuvchi</th>
            <th>Turi</th>
            <th>Platforma</th>
            <th>Narx</th>
            <th>Status</th>
            <th>Vaqti</th>
          </tr>
        </thead>
        <tbody id="ordersList">
          <tr><td colspan="7" style="text-align: center; color: var(--muted);">Yuklanmoqda...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Users Tab -->
    <div id="users" class="tab-content">
      <h2>Foydalanuvchilar</h2>
      <table class="orders-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Ism</th>
            <th>Email</th>
            <th>Telegram</th>
            <th>Balans</th>
            <th>Ro'yxat</th>
          </tr>
        </thead>
        <tbody id="usersList">
          <tr><td colspan="6" style="text-align: center; color: var(--muted);">Yuklanmoqda...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="notifications.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      async function getCsrfToken() {
        const r = await fetch('/api/csrf-token');
        const { csrfToken } = await r.json();
        return csrfToken;
      }

      async function authedFetch(url, opts = {}) {
        const token = await getCsrfToken();
        const headers = Object.assign(
          { 'Content-Type': 'application/json', 'X-CSRF-Token': token },
          opts.headers || {}
        );
        const res = await fetch(url, Object.assign({}, opts, { headers }));
        if (res.status === 401) {
          window.location.href = 'index.html';
          return null;
        }
        if (res.status === 403) {
          window.location.href = 'index.html';
          return null;
        }
        return res;
      }

      try {
        const checkRes = await authedFetch('/api/admin/check');
        if (!checkRes) return;
        const { isAdmin } = await checkRes.json();
        if (!isAdmin) {
          window.location.href = 'index.html';
          return;
        }

        const logoutBtn = document.getElementById('logoutBtn');
        logoutBtn.addEventListener('click', async () => {
          const token = await getCsrfToken();
          await fetch('/api/logout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': token },
            body: JSON.stringify({ _csrf: token })
          });
          window.location.href = 'index.html';
        });

        const tabButtons = document.querySelectorAll('.tab-btn');
        tabButtons.forEach(btn => {
          btn.addEventListener('click', () => {
            tabButtons.forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            document.getElementById(tab).classList.add('active');
            if (tab === 'replenishment') loadReplenishments();
            else if (tab === 'orders') loadOrders();
            else if (tab === 'users') loadUsers();
          });
        });

        async function loadReplenishments() {
          const tbody = document.getElementById('replenishmentList');
          tbody.textContent = '';
          const loading = document.createElement('tr');
          const cell = document.createElement('td');
          cell.colSpan = 6;
          cell.style.textAlign = 'center';
          cell.textContent = 'Yuklanmoqda...';
          loading.appendChild(cell);
          tbody.appendChild(loading);

          try {
            const res = await authedFetch('/api/admin/replenishments');
            if (!res) return;
            const { requests } = await res.json();
            tbody.textContent = '';
            if (!requests || requests.length === 0) {
              const row = document.createElement('tr');
              const c = document.createElement('td');
              c.colSpan = 6;
              c.style.textAlign = 'center';
              c.textContent = "So'rovlar yo'q";
              row.appendChild(c);
              tbody.appendChild(row);
              return;
            }
            requests.forEach(r => {
              const row = document.createElement('tr');
              const cells = [
                `#${r.id}`,
                r.email || r.full_name || `User #${r.user_id}`,
                (r.amount || 0).toLocaleString() + " so'm",
                r.type || '-',
                null,
                new Date(r.created_at).toLocaleString('uz-UZ')
              ];
              cells.forEach((val, idx) => {
                const td = document.createElement('td');
                if (idx === 4) {
                  const badge = document.createElement('span');
                  badge.className = `status-badge status-${r.status}`;
                  badge.textContent = r.status;
                  td.appendChild(badge);
                } else {
                  td.textContent = val;
                }
                row.appendChild(td);
              });
              tbody.appendChild(row);
            });
          } catch (e) {
            tbody.textContent = '';
            const row = document.createElement('tr');
            const c = document.createElement('td');
            c.colSpan = 6;
            c.style.textAlign = 'center';
            c.style.color = 'red';
            c.textContent = 'Xatolik';
            row.appendChild(c);
            tbody.appendChild(row);
          }
        }

        async function loadOrders() {
          const tbody = document.getElementById('ordersList');
          tbody.textContent = '';
          const loading = document.createElement('tr');
          const cell = document.createElement('td');
          cell.colSpan = 7;
          cell.style.textAlign = 'center';
          cell.textContent = 'Yuklanmoqda...';
          loading.appendChild(cell);
          tbody.appendChild(loading);

          try {
            const res = await authedFetch('/api/admin/orders');
            if (!res) return;
            const { orders } = await res.json();
            tbody.textContent = '';
            if (!orders || orders.length === 0) {
              const row = document.createElement('tr');
              const c = document.createElement('td');
              c.colSpan = 7;
              c.style.textAlign = 'center';
              c.textContent = 'Buyurtmalar yoq';
              row.appendChild(c);
              tbody.appendChild(row);
              return;
            }
            orders.forEach(o => {
              const row = document.createElement('tr');
              const cells = [
                `#${o.id}`,
                o.email || `User #${o.user_id}`,
                o.type || '-',
                o.platform || '-',
                (o.price || 0).toLocaleString() + " so'm",
                null,
                new Date(o.created_at).toLocaleString('uz-UZ')
              ];
              cells.forEach((val, idx) => {
                const td = document.createElement('td');
                if (idx === 5) {
                  const badge = document.createElement('span');
                  badge.className = `status-badge status-${o.status}`;
                  badge.textContent = o.status;
                  td.appendChild(badge);
                } else {
                  td.textContent = val;
                }
                row.appendChild(td);
              });
              tbody.appendChild(row);
            });
          } catch (e) {
            tbody.textContent = '';
            const row = document.createElement('tr');
            const c = document.createElement('td');
            c.colSpan = 7;
            c.style.textAlign = 'center';
            c.style.color = 'red';
            c.textContent = 'Xatolik';
            row.appendChild(c);
            tbody.appendChild(row);
          }
        }

        async function loadUsers() {
          const tbody = document.getElementById('usersList');
          tbody.textContent = '';
          const loading = document.createElement('tr');
          const cell = document.createElement('td');
          cell.colSpan = 6;
          cell.style.textAlign = 'center';
          cell.textContent = 'Yuklanmoqda...';
          loading.appendChild(cell);
          tbody.appendChild(loading);

          try {
            const res = await authedFetch('/api/admin/users');
            if (!res) return;
            const { users } = await res.json();
            tbody.textContent = '';
            if (!users || users.length === 0) {
              const row = document.createElement('tr');
              const c = document.createElement('td');
              c.colSpan = 6;
              c.style.textAlign = 'center';
              c.textContent = 'Foydalanuvchilar yoq';
              row.appendChild(c);
              tbody.appendChild(row);
              return;
            }
            users.forEach(u => {
              const row = document.createElement('tr');
              const cells = [
                `#${u.id}`,
                u.full_name || '-',
                u.email || '-',
                u.telegram_username || '-',
                (u.balance || 0).toLocaleString() + " so'm",
                new Date(u.created_at).toLocaleDateString('uz-UZ')
              ];
              cells.forEach(val => {
                const td = document.createElement('td');
                td.textContent = val;
                row.appendChild(td);
              });
              tbody.appendChild(row);
            });
          } catch (e) {
            tbody.textContent = '';
            const row = document.createElement('tr');
            const c = document.createElement('td');
            c.colSpan = 6;
            c.style.textAlign = 'center';
            c.style.color = 'red';
            c.textContent = 'Xatolik';
            row.appendChild(c);
            tbody.appendChild(row);
          }
        }

        loadReplenishments();
      } catch (err) {
        console.error('Admin load error:', err);
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>

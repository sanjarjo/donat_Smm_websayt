<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bildirishnomalar | smpin.uz</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="cookie-consent.css" />
  <style>
    .notifications-header {
      background: var(--surface2);
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .notifications-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .notification-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }
    .notification-item:hover {
      border-color: var(--border-hover);
    }
    .notification-item.unread {
      border-left: 4px solid var(--accent);
    }
    .notification-content {
      flex: 1;
    }
    .notification-title {
      font-weight: 600;
      margin-bottom: 5px;
    }
    .notification-message {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .notification-time {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: right;
      margin-left: 20px;
      white-space: nowrap;
    }
    .empty-notifications {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
  </style>
</head>
<body data-require-auth="1">

  <div class="notifications-header">
    <div class="notifications-container" style="display: flex; justify-content: space-between; align-items: center;">
      <h1 style="margin: 0;">Bildirishnomalar</h1>
      <button class="btn-outline" id="backBtn" style="padding: 10px 20px;">Orqaga</button>
    </div>
  </div>

  <div class="notifications-container">
    <div id="notificationsList">
      <div class="empty-notifications">Yuklanmoqda...</div>
    </div>
  </div>

  <script src="cookie-utils.js"></script>
  <script src="cookie-consent.js"></script>
  <script src="cookie-theme.js"></script>
  <script src="cookie-language.js"></script>
  <script src="cookie-session.js"></script>
  <script src="auth-ui.js"></script>
  <script src="notifications.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const backBtn = document.getElementById('backBtn');
      backBtn.addEventListener('click', () => window.history.back());

      const container = document.getElementById('notificationsList');

      function setEmptyMessage(message) {
        container.textContent = '';
        const empty = document.createElement('div');
        empty.className = 'empty-notifications';
        empty.textContent = message;
        container.appendChild(empty);
      }

      try {
        const csrfRes = await fetch('/api/csrf-token');
        const { csrfToken } = await csrfRes.json();
        const res = await fetch('/api/notifications', {
          headers: { 'X-CSRF-Token': csrfToken }
        });
        if (!res.ok) throw new Error('Failed to load notifications');
        const { notifications } = await res.json();

        container.textContent = '';

        if (!notifications || notifications.length === 0) {
          setEmptyMessage("Bildirishnomalar yo'q");
          return;
        }

        notifications.forEach(notif => {
          const div = document.createElement('div');
          div.className = 'notification-item' + (notif.is_read ? '' : ' unread');
          const date = new Date(notif.created_at).toLocaleDateString('uz-UZ');

          const content = document.createElement('div');
          content.className = 'notification-content';

          const title = document.createElement('div');
          title.className = 'notification-title';
          title.textContent = notif.title;

          const message = document.createElement('div');
          message.className = 'notification-message';
          message.textContent = notif.message;

          content.appendChild(title);
          content.appendChild(message);

          const time = document.createElement('div');
          time.className = 'notification-time';
          time.textContent = date;

          div.appendChild(content);
          div.appendChild(time);

          if (!notif.is_read) {
            div.style.cursor = 'pointer';
            div.addEventListener('click', async () => {
              try {
                await fetch(`/api/notifications/${notif.id}/read`, {
                  method: 'POST',
                  headers: { 'X-CSRF-Token': csrfToken }
                });
                div.classList.remove('unread');
              } catch (e) {
                console.error('Mark as read failed', e);
              }
            });
          }

          container.appendChild(div);
        });
      } catch (err) {
        setEmptyMessage('Xatolik: Bildirishnomalarni yuklashda muammo');
      }
    });
  </script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
